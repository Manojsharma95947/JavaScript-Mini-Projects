<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Notes Sharing App</title>
<link rel="stylesheet" href="index.css">
</head>

<body>
  <header>Notes Sharing App</header>
  <div class="container">
    <div class="topbar">
      <button class="btn" onclick="openModal()">+ New Note</button>
    </div>
    <div id="list" class="list"></div>
    <div id="empty" class="empty">No notes yet. Click “+ New Note”.</div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-box">
      <h3 id="modalTitle">New Note</h3>
      <input id="title" class="input" placeholder="Title" />
      <textarea id="content" rows="4" placeholder="Write your note..."></textarea>
      <input type="file" class="input" id="doc">
      <div class="modal-actions">
        <button class="btn secondary" onclick="closeModal()">Cancel</button>
        <button class="btn" onclick="saveNote()">Save</button>
      </div>
    </div>
  </div>

  <!-- Detail View -->
  <div id="detailModal" class="modal">
    <div class="modal-box detail-box">
      <div class="detail-header">
        <div>
          <h3 id="detailTitle">Note Details</h3>
          <p id="detailDate" class="detail-date">Created on: —</p>
        </div>
        <button class="icon-btn" onclick="closeDetail()" aria-label="Close detail view">×</button>
      </div>
      <div id="detailBody" class="detail-body"></div>
      <div class="modal-actions">
        <button class="btn secondary " onclick="closeDetail()" style="margin-top: 5px;">Back to Notes</button>
      </div>
    </div>
  </div>

<script src="index.js"></script>
</body>
</html>

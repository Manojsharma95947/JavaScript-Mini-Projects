<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon Say</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <h1>Simon Say Game</h1>
    <h2>Let's Begin our Game</h2>

    <div class="box-container">
      <div class="line-one">
        <div class="btn red" type="button" id="red">1</div>
        <div class="btn yellow" type="button" id="yellow">3</div>
      </div>
      <div class="line-two">
        <div class="btn green" type="button" id="green">2</div>
        <div class="btn purple" type="button" id="purple">4</div>
      </div>
    </div>

    <button id="startBtn">Start</button>
    <audio id="gameOverSound" src="Fahhh - QuickSounds.com.mp3"></audio>

    <script src="app.js"></script>
  </body>
</html>

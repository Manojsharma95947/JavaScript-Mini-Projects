<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole Game</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <h1>Whack-a-Mole Game</h1>
    <h3>Begin's the game</h3>
    <div id="game">
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
    </div>
    <p>Score : <span id="score">0</span></p>
    <p >Misses : <span id="miss" >0</span></p>

    <button id="startGame">Start</button>
    <audio id="gameOverSound" src="Fahhh - QuickSounds.com.mp3"></audio>

    <p><b>Notes : You have only 5 lives</b></p>
    

    <script src="app.js"></script>
</body>
</html>
